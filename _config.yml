title: "Conversations en lisières"
description: "Journal d’un citoyen-chercheur automissionné"

url: "https://eniope.github.io"
baseurl: "/conversations-en-lisieres"

theme: null
remote_theme: "mmistakes/minimal-mistakes@4.24.0"


markdown: kramdown
highlighter: rouge

locale: fr
timezone: Europe/Paris

plugins:
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# -------------------------
# NAVIGATION PRINCIPALE
# -------------------------
# (si tu veux la gérer avec _data/navigation.yml, garde juste le bloc suivant)
# rien d'autre ici

# -------------------------
# COLLECTIONS
# -------------------------

collections:
  public:
    output: true
    permalink: /public/:title/
  projet1:
    output: true
    permalink: /projet1/:title/

# -------------------------
# ARCHIVES (catégories / tags)
# -------------------------

category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

# -------------------------
# DEFAULTS
# -------------------------

defaults:
  # Billets du carnet dans _posts/
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      classes: wide
      toc: true
      toc_sticky: true
      read_time: true
      categories: ["carnet"]

  # Fiches publiques dans _public/
  - scope:
      path: ""
      type: public
    values:
      layout: single
      classes: wide
      toc: true
      toc_sticky: true
      categories: ["public"]

  # Pages du Projet 1
  - scope:
      path: ""
      type: projet1
    values:
      layout: single
      classes: wide
      toc: true
      toc_sticky: true
      sidebar:
        nav: "projet1"

# -------------------------
# RECHERCHE
# -------------------------

search: true
lunr:
  search_within_pages: true
