# ---------------------------------
# SITE
# ---------------------------------
title: "Conversations en lisières"
description: "Journal d’un citoyen-chercheur automissionné"

url: "https://eniope.github.io"
baseurl: "/conversations-en-lisieres"

theme: null
remote_theme: "mmistakes/minimal-mistakes@4.24.0"

markdown: kramdown
highlighter: rouge

locale: fr
timezone: Europe/Paris

# ---------------------------------
# PLUGINS
# ---------------------------------
plugins:
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag


# ---------------------------------
# INCLUDES DE PAGES
# ---------------------------------
include:
  - _pages

# ---------------------------------
# RECHERCHE
# ---------------------------------
search: true
lunr:
  search_within_pages: true

# ---------------------------------
# EXTRAITS (blog)
# ---------------------------------
excerpt_separator: "<!--more-->"
show_excerpts: true

# ---------------------------------
# ARCHIVES (catégories / tags)
# ---------------------------------
category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

# ---------------------------------
# DEFAULTS
# ---------------------------------
defaults:
  # Billets du carnet dans _posts/
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      classes: wide
      toc: true
      toc_sticky: true
      read_time: true
      categories: ["carnet"]

  # Pages du dossier "Poser sa voix"
  - scope:
      path: "dossiers/posersavoix"
    values:
      layout: single
      classes: wide
      sidebar:
        nav: "dossier-posersavoix"
      toc: true
      toc_sticky: true
      categories: ["dossiers", "posersavoix"]
