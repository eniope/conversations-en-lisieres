title: "Conversations en lisières"
description: "Journal d’un citoyen-chercheur automissionné"

url: "https://eniope.github.io"
baseurl: "/conversations-en-lisieres"

theme: null
remote_theme: "mmistakes/minimal-mistakes@4.24.0"

markdown: kramdown
highlighter: rouge

locale: fr
timezone: Europe/Paris

plugins:
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single

search: false
