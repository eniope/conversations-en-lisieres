title: "Conversations en lisières"
description: "Journal d’un citoyen-chercheur automissionné"

url: "https://eniope.github.io"
baseurl: "/conversations-en-lisieres"

theme: null
remote_theme: "mmistakes/minimal-mistakes@4.24.0"

markdown: kramdown
highlighter: rouge

locale: fr
timezone: Europe/Paris

plugins:
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

# Defaults existants pour pages normales
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single

# === NOUVEAU : Collection "dossier-posersavoix" ===

collections:
  _dossier-posersavoix:
    output: true
    permalink: /dossiers/posersavoix/:name/

# Defaults spécifiques au dossier poser sa voix
defaults:
  - scope:
      path: ""
      type: dossier-posersavoix
    values:
      layout: single
      sidebar:
        nav: "dossier-posersavoix"
      toc: true
      toc_sticky: true
      categories: ["dossiers", "posersavoix"]

search: true

lunr:
  search_within_pages: true



